version: '3.9'

services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - GATEWAY_PORT=4000
      - FRONTEND_URL=${FRONTEND_URL}
      - USER_SERVICE_URL=http://user-service:4003
      - SITE_SERVICE_URL=http://site-service:4001
      - AI_SERVICE_URL=http://ai-service:4002
      - ANALYTICS_SERVICE_URL=http://analytics-service:4004
    depends_on:
      - user-service
      - site-service
      - ai-service
      - analytics-service
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    ports:
      - '4003:4003'
    environment:
      - NODE_ENV=production
      - USER_SERVICE_PORT=4003
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES=${JWT_EXPIRES}
      - KAFKA_ENABLED=${KAFKA_ENABLED:-false}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-localhost:9092}
      - REDIS_URL=${REDIS_URL}
    restart: unless-stopped

  site-service:
    build:
      context: .
      dockerfile: services/site-service/Dockerfile
    ports:
      - '4001:4001'
    environment:
      - NODE_ENV=production
      - SITE_SERVICE_PORT=4001
      - AI_SERVICE_URL=http://ai-service:4002
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_ENABLED=${KAFKA_ENABLED:-false}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-localhost:9092}
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    ports:
      - '4002:4002'
    environment:
      - NODE_ENV=production
      - AI_SERVICE_PORT=4002
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - KAFKA_ENABLED=${KAFKA_ENABLED:-false}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-localhost:9092}
    restart: unless-stopped

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    ports:
      - '4004:4004'
    environment:
      - NODE_ENV=production
      - ANALYTICS_SERVICE_PORT=4004
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_ENABLED=${KAFKA_ENABLED:-false}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-localhost:9092}
    restart: unless-stopped
